services:
  - type: web
    name: ledgerops-backend
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgerops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ledgerops-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        value: https://ledgerops-ml.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: DEMO_ONLY
        value: "true"
      - key: PAYMENT_PROCESSOR
        value: stripe
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: COMPLIANCE_PROVIDER
        sync: false
      - key: COMPLIANCE_PROVIDER_URL
        sync: false
      - key: COMPLIANCE_PROVIDER_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
  - type: web
    name: ledgerops-ml
    env: docker
    rootDir: ml-service
    plan: starter
    healthCheckPath: /health
  - type: redis
    name: ledgerops-redis
    plan: starter
databases:
  - name: ledgerops-postgres
    plan: starter
