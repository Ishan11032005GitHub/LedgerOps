name: ledgerops

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infinityguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infinityguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  ml-service:
    build: ./ml-service
    volumes:
      - ml_models:/app/model_artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/infinityguard
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-dev-change-me
      ML_SERVICE_URL: http://ml-service:9000
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080,http://localhost:8081
      FRONTEND_URL: http://localhost:8081
      PAYMENT_PROVIDER_MODE: ${PAYMENT_PROVIDER_MODE:-disabled}
      DEMO_ONLY: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PASSWORD_RESET_PREVIEW: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ml-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_ENABLE_OFFLINE_DEMO: "false"
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ml_models:
